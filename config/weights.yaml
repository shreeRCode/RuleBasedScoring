# ── event_weight formula (w1 + w2 = 1.0) ───────────────────────────────────
# event_weight = (w1 * severity_score) + (w2 * event_type_score)
w1: 0.6 # severity_score    — log level severity
w2: 0.4 # event_type_score  — domain knowledge lookup

# ── importance_score formula weights ─────────────────────────────────────────
# importance_score = (alpha * event_weight * confidence * novelty_factor)
#                  + (beta  * novelty_score)
#                  + (gamma * correlation_score)
#                  + (0.3   * rarity_boost)
alpha: 0.60 # event_weight contribution
beta: 0.25 # novelty bonus (was 0.1 in code — now consistent with this file)
gamma: 0.35 # correlation cluster boost

# ── Label thresholds (lower-bound inclusive) ─────────────────────────────────
threshold_ignore: 0.0
threshold_low: 0.85
threshold_medium: 1.0
threshold_high: 1.6
threshold_critical: 2.0

# ── Sliding window sizes ──────────────────────────────────────────────────────
frequency_window_seconds: 60
correlation_window_seconds: 1800
